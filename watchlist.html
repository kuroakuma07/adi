<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Watchlist</title>
<link rel="stylesheet" href="watchlist.css">
</head>

<body>

<div class="container">

<h1>Your Watchlist</h1>
<p>Movies and series you saved to watch later.</p>

<!-- MOVIES WILL LOAD HERE -->
<div class="watchlist-grid" id="watchlistContainer"></div>

<a href="index.html" class="back-btn">⬅ Back to Home</a>

</div>


<script>

/* =========================
   LOAD WATCHLIST MOVIES
========================= */

let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];

let container = document.getElementById("watchlistContainer");

if(watchlist.length === 0){

container.innerHTML = "<p>No movies in watchlist yet.</p>";

}

watchlist.forEach(movie => {

let card = document.createElement("div");

card.classList.add("movie-card");

card.innerHTML = `
<img src="${movie.img}">
<h3>${movie.title}</h3>
<button>Watch Now</button>
`;

container.appendChild(card);

});

</script>
<script src="app.js"></script>
</body>
</html>
